<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>定位展示知识点视图</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <div class="center-circle">
      <div class="logo">HTML</div>
      <div class="logo">CSS</div>
    </div>

    <div class="panel panel-left-top">
      <h3>HTML基础和HTML5</h3>
      <ul>
        <li>HTML整体结构</li>
        <li>HTML5语义标签（article/section）</li>
        <li>HTML5表单/音视频(SVG)</li>
        <li>HTML5新增标记</li>
      </ul>
    </div>
    <div class="panel panel-right-top">
      <h3>JavaScript</h3>
      <ul>
        <li>数据类型</li>
        <li>运算符</li>
        <li>流程控制</li>
        <li>BOM/DOM</li>
      </ul>
    </div>
    <div class="panel panel-bottom">
      <h3>CSS基础和CSS3</h3>
      <ul>
        <li>CSS选择器</li>
        <li>CSS样式</li>
        <li>定位与层叠</li>
        <li>动画与过渡</li>
      </ul>
    </div>
  </div>
</body>
</html>
